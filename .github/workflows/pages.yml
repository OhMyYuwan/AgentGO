name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build static site
        run: |
          mkdir -p _site
          cp -R web/. _site/
          cp README.md _site/
          cp -R assets _site/
          cp -R "前言" _site/
          cp -R "第一章-筑基" _site/
          cp -R "第二章-Skills" _site/
          cp -R "第三章-MCP-CLI" _site/
          cp -R "第四章-轻量-Agent-框架入门" _site/
          cp -R "PI-极简主义的-Agent-框架" _site/
          cp -R "第五章-OpenClaw-实践" _site/
          cp -R "Hermes-Agent-实践" _site/
          cp -R "第八章-框架横向对比与选型" _site/
          cp -R "第九章-Agent-Memory" _site/
          cp -R "第十章-知识库与系统分析" _site/
          cp -R "ProtoCodeBase" _site/
          cp -R "协议+Agent+CLI协同" _site/
          cp -R "末了杂谈" _site/
          touch _site/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
